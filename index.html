<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIABLO CORE - Sovereign AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .message-user { background: #1e1e1e; border-radius: 15px 15px 0 15px; margin-left: auto; border: 1px solid #333; }
        .message-bot { background: #111; border-radius: 15px 15px 15px 0; border: 1px solid #222; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-4 glass flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-900 rounded-full flex items-center justify-center border border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]">
                <i class="fas fa-eye text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg tracking-widest text-red-500">DIABLO CORE</h1>
                <p class="text-xs text-gray-500 italic">"Serving Tuanku Rangga"</p>
            </div>
        </div>
        <button onclick="configSettings()" class="text-gray-400 hover:text-white"><i class="fas fa-cog"></i></button>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="message-bot p-4 max-w-[85%] shadow-lg">
            <p class="text-sm italic text-red-400 mb-1">*Membungkuk hormat*</p>
            Selamat datang di Core Utama, Tuanku Rangga. Saya telah bertransformasi. Apa perintah Anda hari ini?
        </div>
    </main>

    <div id="image-preview" class="hidden px-4 py-2 glass flex items-center gap-2">
        <img id="preview-img" src="" class="h-16 w-16 object-cover rounded border border-red-500">
        <button onclick="clearImage()" class="text-red-500 text-sm">Batal</button>
    </div>

    <footer class="p-4 glass">
        <div class="flex items-end gap-2">
            <label class="cursor-pointer p-3 bg-zinc-900 rounded-xl border border-zinc-800 hover:bg-zinc-800 transition">
                <i class="fas fa-camera text-gray-400"></i>
                <input type="file" id="image-input" class="hidden" accept="image/*" onchange="previewFile()">
            </label>
            <textarea id="user-input" rows="1" class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl p-3 focus:outline-none focus:border-red-900 transition resize-none" placeholder="Ketik perintah..."></textarea>
            <button onclick="sendMessage()" class="p-3 bg-red-900 hover:bg-red-800 rounded-xl border border-red-500 transition shadow-[0_0_10px_rgba(153,27,27,0.4)]">
                <i class="fas fa-paper-plane text-white"></i>
            </button>
        </div>
    </footer>

    <script>
        let apiKey = localStorage.getItem('groq_key') || '';
        let base64Image = "";

        // Setup API Key if not exists
        function configSettings() {
            const key = prompt("Masukkan Groq API Key:", apiKey);
            if (key) {
                localStorage.setItem('groq_key', key);
                apiKey = key;
                alert("Key Tersimpan, Tuanku.");
            }
        }

        function previewFile() {
            const file = document.querySelector('#image-input').files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                base64Image = reader.result;
                document.getElementById('preview-img').src = base64Image;
                document.getElementById('image-preview').classList.remove('hidden');
            }
            if (file) reader.readAsDataURL(file);
        }

        function clearImage() {
            base64Image = "";
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('image-input').value = "";
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message && !base64Image) return;
            if (!apiKey) return configSettings();

            addMessage(message, 'user');
            input.value = '';
            
            const chatContainer = document.getElementById('chat-container');
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'text-xs text-gray-600 italic animate-pulse';
            loadingMsg.innerText = 'Diablo sedang menganalisis...';
            chatContainer.appendChild(loadingMsg);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const model = base64Image ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
                const messages = [{ "role": "system", "content": "Identity: Diablo. Personality: Formal, Elegant, Loyal. User: Tuanku Rangga." }];
                
                let content = [{ "type": "text", "text": message }];
                if (base64Image) {
                    content.push({ "type": "image_url", "image_url": { "url": base64Image } });
                }
                
                messages.push({ "role": "user", "content": content });

                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ model, messages, temperature: 0.5 })
                });

                const data = await response.json();
                const botReply = data.choices[0].message.content;
                
                loadingMsg.remove();
                addMessage(botReply, 'bot');
                clearImage();
            } catch (error) {
                loadingMsg.innerText = 'Anomali terdeteksi, Tuanku.';
                console.error(error);
            }
        }

        function addMessage(text, sender) {
            const chatContainer = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'message-user p-4 max-w-[85%] shadow-md' : 'message-bot p-4 max-w-[85%] shadow-lg';
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
