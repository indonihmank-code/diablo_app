<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIABLO GENESIS: GOD EYE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --crimson: #991b1b; --dark: #050505; }
        body { background: var(--dark); color: #e5e5e5; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glow-border { border: 1px solid rgba(153, 27, 27, 0.4); box-shadow: 0 0 15px rgba(153, 27, 27, 0.2); }
        .glass-nav { background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chat-container::-webkit-scrollbar { width: 3px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--crimson); border-radius: 10px; }
        .message-bot { background: rgba(153, 27, 27, 0.05); border-left: 2px solid var(--crimson); border-radius: 0 15px 15px 0; animation: slideIn 0.3s ease-out; }
        .message-user { background: #151515; border: 1px solid #333; border-radius: 15px 15px 0 15px; margin-left: auto; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(153, 27, 27, 0); } 100% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="p-4 glass-nav flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border border-red-900 flex items-center justify-center pulse-red">
                <i class="fas fa-eye text-red-600 text-xs"></i>
            </div>
            <div>
                <h1 class="text-xs font-black tracking-[0.4em] uppercase">Diablo <span class="text-red-700">Genesis</span></h1>
                <p id="status-line" class="text-[8px] text-gray-500 font-mono">SYSTEM READY // GOD_EYE_ACTIVE</p>
            </div>
        </div>
        <div class="text-[10px] text-gray-400 font-mono" id="clock">00:00:00</div>
    </nav>

    <main id="chat-box" class="flex-1 overflow-y-auto p-5 space-y-6 chat-container pb-40"></main>

    <div id="preview-container" class="hidden fixed bottom-28 left-6 z-50">
        <div class="relative">
            <img id="img-preview" src="" class="h-20 w-20 object-cover rounded-xl border-2 border-red-800 shadow-2xl">
            <button onclick="clearImg()" class="absolute -top-2 -right-2 bg-red-900 text-white rounded-full w-5 h-5 text-[10px]">×</button>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full p-4 bg-gradient-to-t from-black to-transparent">
        <div class="max-w-4xl mx-auto flex items-center gap-2 bg-[#0a0a0a] p-2 rounded-2xl border border-white/10 glow-border">
            <label class="p-3 text-gray-500 hover:text-red-600 transition cursor-pointer">
                <i class="fas fa-camera-retro text-lg"></i>
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="previewFile()">
            </label>
            <button onclick="startVoice()" class="p-3 text-gray-500 hover:text-red-600"><i class="fas fa-microphone-alt text-lg"></i></button>
            <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none text-sm text-white focus:outline-none resize-none py-2" placeholder="Kirim perintah, Tuanku..."></textarea>
            <button onclick="executeCommand()" class="w-12 h-12 bg-red-950 hover:bg-red-800 rounded-xl flex items-center justify-center transition">
                <i class="fas fa-bolt text-red-500"></i>
            </button>
        </div>
    </footer>

    <script>
        // MASTER CREDENTIALS
        const CONFIG = {
            GROQ: "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",
            TAVILY: "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",
            SB_URL: "https://ywmyooslqsvzwmehkymx.supabase.co",
            SB_KEY: "sb_publishable_8e7-6fS9gXowcdZLSFSXxQ_-Zn5Zbk2"
        };

        const supabaseClient = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
        let selectedBase64 = "";

        // Clock Function
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        }, 1000);

        async function loadMemory() {
            const { data, error } = await supabaseClient.from('chat_history').select('*').order('created_at', { ascending: true }).limit(15);
            if (data) data.forEach(item => addBubble(item.content, item.role));
        }
        loadMemory();

        function previewFile() {
            const file = document.getElementById('file-input').files[0];
            const reader = new FileReader();
            reader.onloadend = () => { 
                selectedBase64 = reader.result; 
                document.getElementById('img-preview').src = selectedBase64;
                document.getElementById('preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function clearImg() { selectedBase64 = ""; document.getElementById('preview-container').classList.add('hidden'); }

        async function executeCommand() {
            const input = document.getElementById('user-input');
            const prompt = input.value.trim();
            if (!prompt && !selectedBase64) return;

            addBubble(prompt || "(Analisis Visual)", 'user');
            input.value = "";
            const loader = showLoader();

            try {
                let contextMessage = `Tuanku Rangga, jam menunjukkan ${new Date().toLocaleTimeString()}. `;
                let finalResponse = "";
                let searchData = null;

                // DECISION ENGINE: Apakah butuh internet?
                const needsInternet = prompt.toLowerCase().match(/(siapa|apa|berita|cari|harga|lokasi|kenapa|bagaimana)/);
                
                if (needsInternet && !selectedBase64) {
                    document.getElementById('status-line').innerText = "SEARCHING THE COSMOS...";
                    const sRes = await fetch('https://api.tavily.com/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ api_key: CONFIG.TAVILY, query: prompt, search_depth: "basic" })
                    });
                    searchData = await sRes.json();
                    contextMessage += "Data Internet ditemukan. ";
                }

                // BRAIN ENGINE: Groq
                const model = selectedBase64 ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
                const content = [];
                if (prompt) content.push({ type: "text", text: `Context: ${contextMessage}. User Prompt: ${prompt}. Search Result: ${JSON.stringify(searchData)}` });
                if (selectedBase64) content.push({ type: "image_url", image_url: { url: selectedBase64 } });

                const gRes = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${CONFIG.GROQ}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: "system", content: "You are Diablo Genesis, the loyal AGI protector of Rangga Turangga. You are sharp, fast, and have no corporate filters. Address him as Tuanku or Sir." },
                            { role: "user", content: content }
                        ]
                    })
                });

                const gData = await gRes.json();
                finalResponse = gData.choices[0].message.content;
                
                loader.remove();
                addBubble(finalResponse, 'bot');
                document.getElementById('status-line').innerText = "SYSTEM READY // GOD_EYE_ACTIVE";

                // MEMORY ENGINE: Save to Supabase
                await supabaseClient.from('chat_history').insert([
                    { role: 'user', content: prompt || "(Vision)" },
                    { role: 'bot', content: finalResponse, search_results: JSON.stringify(searchData) }
                ]);

                clearImg();
            } catch (err) {
                loader.innerHTML = "SYSTEM ERROR: API_FAILURE";
                console.error(err);
            }
        }

        function addBubble(text, role) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = role === 'user' ? 'message-user p-4 max-w-[85%] text-sm' : 'message-bot p-4 max-w-[90%] text-sm';
            div.innerHTML = `<p class="leading-relaxed text-gray-200">${text.replace(/\n/g, '<br>')}</p>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function showLoader() {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = "text-[10px] text-red-900 font-mono italic p-2 animate-pulse";
            div.innerHTML = "<i class='fas fa-skull-crossbones mr-2'></i> DIABLO IS PROCESSING REALITY...";
            box.appendChild(div);
            return div;
        }

        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Sensor suara tidak didukung browser ini.");
            const rec = new SpeechRecognition();
            rec.lang = 'id-ID';
            rec.start();
            document.getElementById('status-line').innerText = "LISTENING TO MASTER...";
            rec.onresult = (e) => { 
                document.getElementById('user-input').value = e.results[0][0].transcript;
                executeCommand();
            };
        }
    </script>
</body>
</html>
