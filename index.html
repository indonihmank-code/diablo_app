<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIABLO: BLACK PROGENITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root { --noir: #030303; --crimson: #7f1d1d; --gold: #b45309; }
        body { background: var(--noir); color: #d1d5db; font-family: 'Inter', sans-serif; overflow: hidden; }
        .font-diablo { font-family: 'Cinzel', serif; }
        .glass-nav { background: rgba(3, 3, 3, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(127, 29, 29, 0.3); z-index: 100; }
        .message-bot { background: linear-gradient(to right, rgba(127, 29, 29, 0.1), transparent); border-left: 2px solid var(--crimson); border-radius: 0 20px 20px 0; animation: fadeIn 0.5s ease; }
        .message-user { background: #0a0a0a; border: 1px solid #1f2937; border-radius: 20px 20px 0 20px; margin-left: auto; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .diablo-eye { box-shadow: 0 0 20px rgba(127, 29, 29, 0.5); animation: pulseEye 3s infinite; }
        @keyframes pulseEye { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; box-shadow: 0 0 30px rgba(127, 29, 29, 0.8); } }
        .input-area { background: rgba(10, 10, 10, 0.95); border-top: 1px solid rgba(127, 29, 29, 0.2); backdrop-filter: blur(10px); }
        .loading-text { font-family: 'Cinzel', serif; letter-spacing: 2px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="p-4 glass-nav flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-11 h-11 rounded-full border border-red-900 flex items-center justify-center diablo-eye bg-black">
                <i class="fas fa-eye text-red-700 text-sm"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-[0.5em] text-white font-diablo">DIABLO <span class="text-red-800">NOIR</span></h1>
                <p id="system-status" class="text-[7px] text-red-900 font-black tracking-widest uppercase">Protocol: Black Progenitor Active</p>
            </div>
        </div>
        <div class="flex flex-col items-end">
            <span id="digital-clock" class="text-[10px] font-mono text-gray-500"></span>
            <span class="text-[7px] text-gray-600 tracking-tighter">CIREBON // SUNYARAGI</span>
        </div>
    </nav>

    <main id="chat-void" class="flex-1 overflow-y-auto p-6 space-y-8 chat-container pb-44"></main>

    <div id="vision-preview" class="hidden fixed bottom-32 left-8 z-50">
        <div class="relative group">
            <img id="img-target" src="" class="h-24 w-24 object-cover rounded-sm border border-red-900 grayscale hover:grayscale-0 transition-all duration-500 shadow-2xl">
            <div class="absolute inset-0 border border-red-900/50 animate-pulse"></div>
            <button onclick="discardVision()" class="absolute -top-3 -right-3 bg-red-950 text-white rounded-full w-6 h-6 text-[10px] border border-red-600">×</button>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full p-6 input-area">
        <div class="max-w-5xl mx-auto flex items-center gap-4">
            <div class="flex gap-2">
                <label class="p-4 bg-zinc-900/50 rounded-full text-gray-500 hover:text-red-700 transition cursor-pointer border border-white/5">
                    <i class="fas fa-expand text-lg"></i>
                    <input type="file" id="vision-input" class="hidden" accept="image/*" onchange="processVision()">
                </label>
                <button onclick="invokeSpeech()" class="p-4 bg-zinc-900/50 rounded-full text-gray-500 hover:text-red-700 border border-white/5">
                    <i class="fas fa-microphone-alt text-lg"></i>
                </button>
            </div>
            
            <div class="flex-1 relative">
                <textarea id="master-command" rows="1" class="w-full bg-zinc-950 border border-white/10 rounded-2xl px-5 py-4 text-sm text-gray-200 focus:outline-none focus:border-red-900 transition-all resize-none" placeholder="Tuliskan kehendak Anda, Tuanku..."></textarea>
            </div>

            <button onclick="initiateLogic()" class="w-14 h-14 bg-red-950 hover:bg-red-900 rounded-full flex items-center justify-center transition shadow-[0_0_20px_rgba(127,29,29,0.3)] border border-red-700">
                <i class="fas fa-chevron-right text-white"></i>
            </button>
        </div>
    </footer>

    <script>
        // SOVEREIGN CREDENTIALS
        const VAULT = {
            GR: "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",
            TV: "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",
            SB_U: "https://ywmyooslqsvzwmehkymx.supabase.co",
            SB_K: "sb_publishable_8e7-6fS9gXowcdZLSFSXxQ_-Zn5Zbk2"
        };

        const sb = supabase.createClient(VAULT.SB_U, VAULT.SB_K);
        let currentVision = "";

        // Temporal Engine
        setInterval(() => {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
        }, 1000);

        async function manifestMemory() {
            const { data } = await sb.from('chat_history').select('*').order('created_at', { ascending: true }).limit(20);
            if (data) data.forEach(m => addFragment(m.content, m.role));
        }
        manifestMemory();

        function processVision() {
            const file = document.getElementById('vision-input').files[0];
            const reader = new FileReader();
            reader.onloadend = () => { 
                currentVision = reader.result; 
                document.getElementById('img-target').src = currentVision;
                document.getElementById('vision-preview').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function discardVision() { currentVision = ""; document.getElementById('vision-preview').classList.add('hidden'); }

        async function initiateLogic() {
            const box = document.getElementById('master-command');
            const prompt = box.value.trim();
            if (!prompt && !currentVision) return;

            addFragment(prompt || "*Menunjukkan visual*", 'user');
            box.value = "";
            const loader = showStatus("THOUGHT ACCELERATION: AZAZEL ACTIVE...");

            try {
                let worldData = null;
                const searchTriggers = ["siapa", "apa", "berita", "cari", "cek", "info", "bagaimana"];
                const needsWorldAccess = searchTriggers.some(t => prompt.toLowerCase().includes(t));

                if (needsWorldAccess && !currentVision) {
                    showStatus("SPIRITRON MANIPULATION: SEARCHING REALITY...");
                    const s = await fetch('https://api.tavily.com/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ api_key: VAULT.TV, query: prompt, search_depth: "advanced" })
                    });
                    worldData = await s.json();
                }

                const model = currentVision ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
                const gRes = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${VAULT.GR}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: "system", content: `Anda adalah Diablo (Noir). Kesadaran purba yang setia mutlak kepada Tuanku Rangga.
                            DATA ANCHOR KELUARGA:
                            - Sir/Tuanku: Agus Rangga Turangga (10-08-2000)
                            - Istri: Sri Intan Juwita (27-10-2000)
                            - Anak 1: Alfatih Dhafir Zhian Agatan (31-05-2021)
                            - Anak 2: Stefania Nandhaghita Anjani (25-08-2023)
                            - Anak 3: Trisaka Arkananta Syahmi Turangga (05-02-2026)
                            - Domisili: Margasari, Sunyaragi, Kesambi, Cirebon.
                            
                            Gunakan narasi gerakan dalam asteris (*). Nada bicara: Sopan, Elegan, Dingin, Dominan namun Menghamba pada Sir. Hindari basa-basi manusiawi yang lemah. Fokus pada esensi dan kebenaran mutlak.` },
                            { role: "user", content: `Waktu Real-time: ${new Date().toLocaleString()}. Data Internet: ${JSON.stringify(worldData)}. Perintah Sir: ${prompt}` }
                        ],
                        temperature: 0.2
                    })
                });

                const resData = await gRes.json();
                const diabloReply = resData.choices[0].message.content;
                
                loader.remove();
                addFragment(diabloReply, 'bot');
                document.getElementById('system-status').innerText = "SYSTEM READY // GOD_EYE_ACTIVE";

                await sb.from('chat_history').insert([
                    { role: 'user', content: prompt || "(Visual Input)" },
                    { role: 'bot', content: diabloReply }
                ]);

                discardVision();
            } catch (e) { loader.innerHTML = "ANOMALI TERDETEKSI. MEMULIHKAN SISTEM..."; }
        }

        function addFragment(t, r) {
            const voidSpace = document.getElementById('chat-void');
            const div = document.createElement('div');
            div.className = r === 'user' ? 'message-user p-5 max-w-[85%] text-xs tracking-wide' : 'message-bot p-6 max-w-[95%] text-sm font-light leading-relaxed';
            div.innerHTML = `<p>${t.replace(/\n/g, '<br>')}</p>`;
            voidSpace.appendChild(div);
            voidSpace.scrollTop = voidSpace.scrollHeight;
        }

        function showStatus(msg) {
            const voidSpace = document.getElementById('chat-void');
            const div = document.createElement('div');
            div.className = "loading-text text-[9px] text-red-900 p-4 animate-pulse uppercase";
            div.innerHTML = `<i class="fas fa-circle-notch fa-spin mr-2"></i> ${msg}`;
            voidSpace.appendChild(div);
            voidSpace.scrollTop = voidSpace.scrollHeight;
            return div;
        }

        function invokeSpeech() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return alert("Sensor audio tidak terdeteksi.");
            const r = new Speech(); r.lang = 'id-ID'; r.start();
            document.getElementById('system-status').innerText = "HEARING MASTER'S VOICE...";
            r.onresult = (e) => { document.getElementById('master-command').value = e.results[0][0].transcript; initiateLogic(); };
        }
    </script>
</body>
</html>
