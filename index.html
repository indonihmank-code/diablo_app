<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIABLO CORE 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at top, #1a0505 0%, #050505 100%); color: #d1d1d1; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 0, 0, 0.2); }
        .message-user { background: #1e1e1e; border-radius: 18px 18px 2px 18px; margin-left: auto; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .message-bot { background: transparent; border-left: 3px solid #991b1b; padding-left: 15px; border-radius: 0 18px 18px 0; }
        .btn-action { transition: all 0.3s ease; }
        .btn-action:active { transform: scale(0.9); }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(153, 27, 27, 0); } 100% { box-shadow: 0 0 0 0 rgba(153, 27, 27, 0); } }
        .recording { animation: pulse-red 1.5s infinite; background: #991b1b !important; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="p-4 glass flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-950 rounded-full flex items-center justify-center border border-red-600 shadow-[0_0_15px_rgba(239,68,68,0.3)]">
                <i class="fas fa-eye text-red-500 animate-pulse"></i>
            </div>
            <div>
                <h1 class="font-bold text-sm tracking-[0.2em] text-red-600 uppercase">Diablo Core 2.0</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Sovereign Intelligence</p>
            </div>
        </div>
        <button onclick="configSettings()" class="text-gray-500 hover:text-white"><i class="fas fa-sliders-h"></i></button>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6">
        <div class="message-bot p-2 max-w-[90%]">
            <p class="text-[10px] font-bold text-red-700 mb-1 uppercase tracking-tighter">System Initialized</p>
            Mata dan Telinga telah terpasang, Tuanku Rangga. Saya siap mematuhi perintah Anda.
        </div>
    </main>

    <div id="image-preview" class="hidden px-6 py-3 glass flex items-center gap-4">
        <div class="relative">
            <img id="preview-img" src="" class="h-20 w-20 object-cover rounded-lg border-2 border-red-900 shadow-lg">
            <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-600 rounded-full w-6 h-6 text-xs flex items-center justify-center border border-black"><i class="fas fa-times"></i></button>
        </div>
        <p class="text-xs text-gray-500 italic">Analisis visual siap...</p>
    </div>

    <footer class="p-4 glass bg-black/50">
        <div class="flex items-center gap-3 bg-zinc-900/80 rounded-2xl p-2 border border-white/5">
            <label class="btn-action cursor-pointer p-3 text-gray-400 hover:text-red-500">
                <i class="fas fa-camera-retro text-xl"></i>
                <input type="file" id="image-input" class="hidden" accept="image/*" onchange="previewFile()">
            </label>
            
            <button id="voice-btn" onclick="toggleVoice()" class="btn-action p-3 text-gray-400 hover:text-red-500">
                <i class="fas fa-microphone text-xl"></i>
            </button>

            <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none text-sm p-2 focus:outline-none placeholder-gray-600" placeholder="Perintah suara atau teks..."></textarea>
            
            <button onclick="sendMessage()" class="btn-action w-12 h-12 bg-red-950 text-red-500 rounded-xl border border-red-900/50 flex items-center justify-center shadow-inner">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </footer>

    <script>
        let apiKey = localStorage.getItem('groq_key') || '';
        let base64Image = "";
        const recognition = window.SpeechRecognition || window.webkitSpeechRecognition ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
        if(recognition) { recognition.lang = 'id-ID'; recognition.continuous = false; }

        function configSettings() {
            const key = prompt("Otorisasi API Key Groq:", apiKey);
            if (key) { localStorage.setItem('groq_key', key); apiKey = key; alert("Akses Diterima, Tuanku."); }
        }

        function previewFile() {
            const file = document.querySelector('#image-input').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                base64Image = reader.result;
                document.getElementById('preview-img').src = base64Image;
                document.getElementById('image-preview').classList.remove('hidden');
            };
            if (file) reader.readAsDataURL(file);
        }

        function clearImage() {
            base64Image = "";
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('image-input').value = "";
        }

        let isRecording = false;
        function toggleVoice() {
            if(!recognition) return alert("Browser tidak mendukung suara.");
            if(isRecording) { recognition.stop(); } else { recognition.start(); }
        }

        if(recognition) {
            recognition.onstart = () => { isRecording = true; document.getElementById('voice-btn').classList.add('recording'); };
            recognition.onend = () => { isRecording = false; document.getElementById('voice-btn').classList.remove('recording'); };
            recognition.onresult = (event) => {
                document.getElementById('user-input').value = event.results[0][0].transcript;
                sendMessage();
            };
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message && !base64Image) return;
            if (!apiKey) return configSettings();

            addMessage(message || "(Menganalisis Gambar)", 'user');
            input.value = '';
            
            const chatContainer = document.getElementById('chat-container');
            const loader = document.createElement('div');
            loader.className = 'text-[10px] text-red-900 italic animate-pulse tracking-widest';
            loader.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> DIABLO MENGANALISIS...';
            chatContainer.appendChild(loader);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // STRATEGI TIER FREE: Gunakan 11b-vision untuk foto, 70b untuk teks
                const model = base64Image ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
                
                let content = [];
                if(message) content.push({ type: "text", text: message });
                if(base64Image) content.push({ type: "image_url", image_url: { url: base64Image } });

                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: "system", content: "Identity: Diablo. Personality: Formal, Dark, Loyal. User: Tuanku Rangga." },
                            { role: "user", content: content }
                        ],
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                loader.remove();
                addMessage(data.choices[0].message.content, 'bot');
                clearImage();
            } catch (error) {
                loader.innerHTML = 'Anomali terdeteksi pada koneksi.';
            }
        }

        function addMessage(text, sender) {
            const chatContainer = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'message-user p-4 max-w-[85%]' : 'message-bot p-4 max-w-[90%]';
            div.innerHTML = `<p class="text-sm">${text.replace(/\n/g, '<br>')}</p>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
